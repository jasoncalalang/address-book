apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: address-book
  labels:
    app: address-book
spec:
  ingressClassName: traefik
  rules:
    # Host is patched per-environment by the kustomize overlays.
    - host: address-book.PLACEHOLDER.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: address-book
                port:
                  number: 80
